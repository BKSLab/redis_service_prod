services:
  redis:
    image: redis/redis-stack:7.4.0-v8
    container_name: shared_redis
    restart: always
    env_file: .env
    environment:
      # --requirepass — обязательная авторизация (шаренный брокер, не
      # локальный dev-инстанс без пароля). --appendonly — AOF поверх
      # дефолтных RDB-снапшотов: шаренный сервис может обслуживать не
      # только TTL-чекпоинты (как сейчас vera_agent_service), но и
      # проекты, которым важна персистентность между рестартами.
      REDIS_ARGS: "--requirepass ${REDIS_PASSWORD} --appendonly yes"
    volumes:
      - redis_data:/data
    ports:
      # Redis — на всех интерфейсах: сюда подключаются другие
      # docker-compose проекты (vera_agent_service и будущие) по
      # host:port, без общей docker-сети — см. README.md. В проде
      # ограничить доступ файрволом/security group до конкретных
      # серверов-потребителей.
      - "6379:6379"
      # RedisInsight (UI) — по умолчанию только с самого хоста
      # (127.0.0.1 не публикует порт наружу). Доступ извне —
      # SSH-туннель (`ssh -L 8001:127.0.0.1:8001 user@host`) или
      # reverse-proxy с авторизацией, не публиковать напрямую в интернет.
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  redis_data:
